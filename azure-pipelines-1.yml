trigger:
- main
- feature

pool: 'mypool'

stages:

# ------------------ PLANNING ------------------
- stage: Planning_Stage
  displayName: Terraform Planning
  jobs:
  - job: Terraform_Workflow
    displayName: Terraform Workflow
    steps:

    # 🔹 INIT
    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/infra_code'
        backendServiceArm: 'myfirstproject'
        backendAzureRmResourceGroupName: 'myrg'
        backendAzureRmStorageAccountName: 'storageaccount'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'alt.tfstate'

    # 🔹 FMT
    - task: TerraformTask@5
      displayName: Terraform Fmt
      inputs:
        provider: 'azurerm'
        command: 'custom'
        customCommand: 'fmt'
        workingDirectory: '$(System.DefaultWorkingDirectory)/infra_code'

    # 🔹 VALIDATE
    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(System.DefaultWorkingDirectory)/infra_code'

    # 🔹 PLAN
    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/infra_code'
        environmentServiceNameAzureRM: 'myfirstproject'
        commandOptions: '-out=tfplan'


# ------------------ SECURITY ------------------
- stage: Security_Checks
  dependsOn: Planning_Stage
  jobs:
  - job: tfsec_scan
    steps:
    - task: tfsec@1
      inputs:
        version: 'v1.26.0'
        dir: '$(System.DefaultWorkingDirectory)/infra_code'


# ------------------ APPROVAL ------------------
- stage: Approval_Stage
  dependsOn: Security_Checks
  jobs:
  - job: Manual_Approval
    pool: server
    steps:
    - task: ManualValidation@1
      inputs:
        notifyUsers: 'kashafrocks@gmail.com'
        approvers: 'khan.kashafsalman@gmail.com'
        instructions: 'Approve before apply'


# ------------------ APPLY ------------------
- stage: Apply_Stage
  dependsOn: Approval_Stage
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: Terraform_Apply
    steps:

    # 🔹 INIT (required again in new stage)
    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/infra_code'
        backendServiceArm: 'myfirstproject'
        backendAzureRmResourceGroupName: 'myrg'
        backendAzureRmStorageAccountName: 'storageaccount'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'alt.tfstate'

    # 🔹 APPLY
    - task: TerraformTask@5
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/infra_code'
        commandOptions: 'tfplan'
        environmentServiceNameAzureRM: 'myfirstproject'